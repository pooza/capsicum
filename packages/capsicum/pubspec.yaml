name: capsicum
description: Flutter-based Mastodon / Misskey client
publish_to: none
version: 1.0.1+13

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  capsicum_core:
    path: ../capsicum_core
  capsicum_backends:
    path: ../capsicum_backends
  fediverse_objects:
    path: ../fediverse_objects
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  dio: ^5.8.0+1
  flutter_web_auth_2: ^4.0.0
  url_launcher: ^6.3.1
  workmanager: ^0.9.0
  flutter_local_notifications: ^18.0.0
  image_picker: ^1.2.1
  video_player: ^2.11.0
  package_info_plus: ^8.3.0
  sentry_flutter: ^9.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  sentry_dart_plugin: ^2.3.0

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: capsicum
  org: b-shock-co-ltd

flutter:
  uses-material-design: true
  assets:
    - assets/images/
