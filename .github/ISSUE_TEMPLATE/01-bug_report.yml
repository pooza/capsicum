name: バグ報告
description: 不具合・意図しない動作の報告
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きているかを簡潔に
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: どうすれば再現できるか
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: どうなるべきか
    validations:
      required: false
  - type: input
    id: platform
    attributes:
      label: プラットフォーム
      description: Android / iOS / 両方 / 未確認
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 補足
      description: プラットフォーム、サーバー名、スクリーンショット、ログなど
    validations:
      required: false
