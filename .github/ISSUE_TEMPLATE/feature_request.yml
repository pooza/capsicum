name: 機能要望
description: 新機能・改善の提案
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どんな機能が欲しいか
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 背景・動機
      description: なぜその機能が欲しいか、どんな場面で困っているか
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 補足
      description: 参考になるスクリーンショット、他アプリの例など
    validations:
      required: false
